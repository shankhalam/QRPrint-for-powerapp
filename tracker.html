<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Medicina Delivery Tracker</title>
    <style>
        @page { size: A4 portrait; margin: 10mm; }
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; padding: 0; color: #000; font-size: 12px; }
        .container { padding: 10mm; }
        header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #000; margin-bottom: 10px; padding-bottom: 5px; }
        .logo img { height: 50px; }
        .qr-header img { height: 80px; width: 80px; }
        .title { font-size: 18pt; font-weight: bold; }
        .details-row { display: flex; justify-content: space-between; font-size: 11pt; margin-bottom: 5px; }
        table { width: 100%; border-collapse: collapse; font-size: 9pt; margin: 15px 0; }
        th, td { border: 1px solid #ccc; padding: 4px; text-align: center; }
        th { background-color: #e6f0ff; font-weight: 600; }
        .total-row { font-weight: bold; background-color: #f1f1f1; }
        .footer { display: flex; justify-content: space-between; border-top: 2px solid #000; padding-top: 10px; margin-top: 20px; }
        .signature-box { border: 1px solid #000; padding: 10px; width: 220px; height: 100px; }
        .sig-line { border-bottom: 1px solid #000; display: inline-block; width: 120px; height: 15px; }
        .terms { font-size: 9pt; margin-top: 20px; text-align: justify; }
        .barcodes-page { page-break-before: always; text-align: center; }
        .barcode-grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; margin-top: 20px; }
        .barcode-item { border: 1px solid #ddd; padding: 10px; text-align: center; }
        .barcode-item img { width: 200px; height: 60px; }
    </style>
</head>
<body onload="renderTracker()">
    <div class="container" id="mainContent">
        <header>
            <div class="logo"><img id="compLogo" src="" alt="Logo"></div>
            <div class="title">DELIVERY TRACKER</div>
            <div class="qr-header"><img id="pkgQR" src="" alt="Package QR"></div>
        </header>
        <div class="details-row">
            <div>From: <strong>Medicina Drug Store</strong></div>
            <div>To: <strong><span id="pharmacyDisplay" style="font-size:13pt;"></span></strong></div>
        </div>
        <div class="details-row">
            <div>Date: <strong id="dateDisplay"></strong></div>
            <div>Crates TR: <strong id="cratesTRDisplay"></strong></div>
        </div>
        <table>
            <thead>
                <tr>
                    <th>TRANSFER NUMBER</th><th>VOUCHER NUMBER</th><th>CRATES</th>
                    <th>BOX</th><th>FRIDGE BAG</th><th>BAG</th><th>PACKER</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
            <tr class="total-row">
                <td colspan="2">TOTAL</td>
                <td id="totCrates"></td><td id="totBoxes"></td>
                <td id="totFB"></td><td id="totBags"></td><td></td>
            </tr>
        </table>
        <div class="footer">
            <div>Warehouse Lead:<br><strong>Dr. Mohamed Tarek</strong></div>
            <div class="signature-box">
                <div>Received By: <span class="sig-line"></span></div>
                <div style="margin-top:10px;">Date: <span class="sig-line"></span></div>
                <div style="margin-top:10px;">Signature: <span class="sig-line"></span></div>
            </div>
        </div>
        <div class="terms">
            <strong>Terms and Conditions:</strong> All items subject to inspection. Report issues within 48 hours.
        </div>
        <div class="barcodes-page">
            <h2 style="border-bottom: 2px solid #000; padding-bottom: 10px;">Package Barcodes</h2>
            <div class="barcode-grid" id="barcodeGrid"></div>
        </div>
    </div>

    <script>
        function renderTracker() {
            const data = JSON.parse(decodeURIComponent(new URLSearchParams(window.location.search).get('data')));
            document.getElementById('compLogo').src = data.Logo;
            document.getElementById('pkgQR').src = `https://api.qrserver.com/v1/create-qr-code/?data=${data.MasterID}`;
            document.getElementById('pharmacyDisplay').innerText = data.Pharmacy;
            document.getElementById('dateDisplay').innerText = data.Date;
            document.getElementById('cratesTRDisplay').innerText = data.CratesTR || "-";
            
            let rowsHtml = "";
            data.Rows.forEach(r => {
                rowsHtml += `<tr><td>${r.TR}</td><td>${r.V}</td><td>${r.C}</td><td>${r.Bx}</td><td>${r.F}</td><td>${r.Bg}</td><td>${r.P}</td></tr>`;
            });
            document.getElementById('tableBody').innerHTML = rowsHtml;
            document.getElementById('totCrates').innerText = data.TC;
            document.getElementById('totBoxes').innerText = data.TBx;
            document.getElementById('totFB').innerText = data.TF;
            document.getElementById('totBags').innerText = data.TBg;

            let bcHtml = "";
            data.Barcodes.forEach(b => {
                bcHtml += `<div class="barcode-item"><img src="https://barcode.tec-it.com/barcode.ashx?data=${b}&code=Code128"><p>${b}</p></div>`;
            });
            document.getElementById('barcodeGrid').innerHTML = bcHtml;
        }
    </script>
</body>
</html>
