<script>
    function renderTracker() {
        try {
            // 1. Get and Parse Data
            const urlParams = new URLSearchParams(window.location.search);
            const dataParam = urlParams.get('data');
            if (!dataParam) throw new Error("No data");
            
            const data = JSON.parse(decodeURIComponent(dataParam));

            // 2. Set Header Details
            document.getElementById('pkgQR').src = `https://api.qrserver.com/v1/create-qr-code/?data=${encodeURIComponent(data.MasterID)}&size=150x150`;
            document.getElementById('trackerIdDisplay').innerText = data.MasterID;
            document.getElementById('pharmacyDisplay').innerText = data.Pharmacy;
            document.getElementById('dateDisplay').innerText = data.Date;
            document.getElementById('cratesTRDisplay').innerText = data.CratesTR || "-";

            // 3. Render Table Rows (One clean loop)
            let rowsHtml = "";
            data.Rows.forEach(r => {
                rowsHtml += `
                    <tr>
                        <td class="multi-line">${r.TR}</td>
                        <td class="multi-line">${r.V}</td>
                        <td>${r.C}</td>
                        <td>${r.Bx}</td>
                        <td>${r.F}</td>
                        <td>${r.Bg}</td>
                        <td>${r.P || 'N/A'}</td> 
                    </tr>`;
            });
            document.getElementById('tableBody').innerHTML = rowsHtml;

            // 4. Set Totals
            document.getElementById('totCrates').innerText = data.TC;
            document.getElementById('totBoxes').innerText = data.TBx;
            document.getElementById('totFB').innerText = data.TF;
            document.getElementById('totBags').innerText = data.TBg;

            // 5. Render Barcodes
            let bcHtml = "";
            data.Barcodes.forEach(b => {
                const codeValue = typeof b === 'object' ? (b.Code || b.BarcodeNumber) : b;
                if(codeValue) {
                    bcHtml += `<div class="barcode-item"><img src="https://barcode.tec-it.com/barcode.ashx?data=${codeValue}&code=Code128"></div>`;
                }
            });
            document.getElementById('barcodeGrid').innerHTML = bcHtml;

        } catch (e) {
            console.error(e);
            document.body.innerHTML = "<h1 style='color:red;'>Error Loading Tracker Data</h1>";
        }
    }
</script>
