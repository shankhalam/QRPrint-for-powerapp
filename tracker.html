<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Medicina Delivery Tracker</title>
    <style>
        @page { size: A4 portrait; margin: 10mm; }
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; padding: 0; color: #000; font-size: 11px; }
        .container { padding: 5mm; }
        
        /* HEADER: Logo Left, QR Right */
        header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #000; margin-bottom: 5px; padding-bottom: 5px; }
        .logo-box img { height: 60px; max-width: 150px; object-fit: contain; }
        .qr-header-box { text-align: center; }
        .qr-header-box img { height: 80px; width: 80px; display: block; }
        
        .title-section { text-align: center; flex-grow: 1; }
        .title { font-size: 20pt; font-weight: bold; margin: 0; }
        /* Tracker ID Line */
        .tracker-id { font-size: 12pt; font-weight: 600; margin-top: 2px; color: #444; }

        .details-row { display: flex; justify-content: space-between; font-size: 11pt; margin-bottom: 3px; }
        
        /* TABLE: Multi-line support for TR/Vouchers */
        table { width: 100%; border-collapse: collapse; margin: 10px 0; }
        th, td { border: 1px solid #999; padding: 6px; text-align: center; vertical-align: top; }
        /* This CSS ensures Char(10) from Power Apps creates a new line */
        td.multi-line { white-space: pre-wrap; line-height: 1.4; text-align: left; padding-left: 10px; }
        th { background-color: #f2f2f2; font-weight: bold; }
        .total-row { font-weight: bold; background-color: #eee; }

        .footer { display: flex; justify-content: space-between; border-top: 2px solid #000; padding-top: 10px; margin-top: 20px; }
        .signature-box { border: 1px solid #000; padding: 8px; width: 220px; height: 90px; font-size: 9pt; }
        .sig-line { border-bottom: 1px solid #000; display: inline-block; width: 110px; height: 12px; margin-left: 5px; }

        .barcodes-page { page-break-before: always; text-align: center; padding-top: 10mm; }
        .barcode-grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; margin-top: 30px; }
        .barcode-item { border: 1px solid #ccc; padding: 15px; background: #fff; }
        .barcode-item img { width: 220px; height: 70px; }
    </style>
</head>
<body onload="renderTracker()">
    <div class="container">
        <header>
            <div class="logo-box"><img id="compLogo" src=""></div>
            <div class="title-section">
                <div class="title">DELIVERY TRACKER</div>
                <div class="tracker-id">Tracker ID: <span id="trackerIdDisplay"></span></div>
            </div>
            <div class="qr-header-box">
                <img id="pkgQR" src="">
            </div>
        </header>

        <div class="details-row">
            <div>From: <strong>Medicina Drug Store</strong></div>
            <div>To: <strong><span id="pharmacyDisplay" style="font-size:13pt;"></span></strong></div>
        </div>
        <div class="details-row">
            <div>Date: <strong id="dateDisplay"></strong></div>
            <div>Crates TR: <strong id="cratesTRDisplay"></strong></div>
        </div>

        <table>
            <thead>
                <tr>
                    <th>TRANSFER NUMBER</th><th>VOUCHER NUMBER</th><th>CRATES</th>
                    <th>BOX</th><th>FRIDGE BAG</th><th>BAG</th><th>PACKER</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
            <tr class="total-row">
                <td colspan="2">TOTAL</td>
                <td id="totCrates"></td><td id="totBoxes"></td>
                <td id="totFB"></td><td id="totBags"></td><td></td>
            </tr>
        </table>

        <div class="footer">
            <div>Warehouse Lead:<br><strong>Dr. Mohamed Tarek</strong></div>
            <div class="signature-box">
                <div>Received By: <span class="sig-line"></span></div>
                <div style="margin-top:10px;">Date: <span class="sig-line"></span></div>
                <div style="margin-top:10px;">Signature: <span class="sig-line"></span></div>
            </div>
        </div>
    </div>

    <div class="barcodes-page">
        <h2 style="border-bottom: 2px solid #000; padding-bottom: 10px;">Package Barcodes</h2>
        <div class="barcode-grid" id="barcodeGrid"></div>
    </div>

    <script>
        function renderTracker() {
            try {
                const data = JSON.parse(decodeURIComponent(new URLSearchParams(window.location.search).get('data')));
                
                document.getElementById('compLogo').src = data.Logo;
                // 1. QR Code is strictly the Package ID (MasterID)
                document.getElementById('pkgQR').src = `https://api.qrserver.com/v1/create-qr-code/?data=${encodeURIComponent(data.MasterID)}&size=150x150`;
                // 2. Display Tracker ID below the title
                document.getElementById('trackerIdDisplay').innerText = data.MasterID;
                
                document.getElementById('pharmacyDisplay').innerText = data.Pharmacy;
                document.getElementById('dateDisplay').innerText = data.Date;
                document.getElementById('cratesTRDisplay').innerText = data.CratesTR || "-";
                
                let rowsHtml = "";
                data.Rows.forEach(r => {
                    // 3. Applying the 'multi-line' class to TR and Voucher cells
                    rowsHtml += `<tr><td class="multi-line">${r.TR}</td><td class="multi-line">${r.V}</td><td>${r.C}</td><td>${r.Bx}</td><td>${r.F}</td><td>${r.Bg}</td><td>${r.P}</td></tr>`;
                });
                document.getElementById('tableBody').innerHTML = rowsHtml;
                document.getElementById('totCrates').innerText = data.TC;
                document.getElementById('totBoxes').innerText = data.TBx;
                document.getElementById('totFB').innerText = data.TF;
                document.getElementById('totBags').innerText = data.TBg;

                // 4. Render Crate Barcodes on the second page
                let bcHtml = "";
                data.Barcodes.forEach(b => {
                    bcHtml += `<div class="barcode-item"><img src="https://barcode.tec-it.com/barcode.ashx?data=${b}&code=Code128"><p style="font-weight:bold; margin-top:5px;">${b}</p></div>`;
                });
                document.getElementById('barcodeGrid').innerHTML = bcHtml;

            } catch (e) {
                document.body.innerHTML = "<h1 style='color:red;'>Error Loading Tracker Data</h1>";
            }
        }
    </script>
</body>
</html>
